<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./swiper-bundle.min.css">
    <link rel="stylesheet" href="./style.css">
    <title>Servise</title>
</head>

<body>

    <header class="page-header">
        <h1 class="page-header__title">
            Ремонт техники различных брендов
        </h1>
    </header>
    <main>
        <!-- Slider main container -->
        <section class="swiper brands">
            <!-- Additional required wrapper -->
            <ul class="swiper-wrapper brands__list">
                <!-- Slides -->
                <li class="swiper-slide brands__item">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/acer.svg" alt="Acer">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li class="swiper-slide brands__item">
                    <div class="brands__card">
                        <img class="brands__logo brands__logo--apple" src="./icon/apple.svg" alt="Apple">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li class="swiper-slide brands__item">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/bosch.svg" alt="Bosch">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li class="swiper-slide brands__item">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/HP.svg" alt="HP">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li class="swiper-slide brands__item">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/lenovo.svg" alt="Lenovo">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li class="swiper-slide brands__item">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/samsung.svg" alt="Samsung">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li class="swiper-slide brands__item brands__item-tablet brands__item-tablet--hidden">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/sony.svg" alt="Sony">
                    </div>
                    <button class="brands__go brands__item-hidden">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li class="swiper-slide brands__item brands__item-tablet brands__item-tablet--hidden">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/ViewSonic.svg" alt="ViewSonic">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li
                    class="swiper-slide brands__item brands__item-tablet brands__item-desktop brands__item-tablet--hidden brands__item-desktop--hidden">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/acer.svg" alt="Acer">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li
                    class="swiper-slide brands__item brands__item-tablet brands__item-desktop brands__item-tablet--hidden brands__item-desktop--hidden">
                    <div class="brands__card">
                        <img class="brands__logo brands__logo--apple" src="./icon/apple.svg" alt="Apple">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
                <li
                    class="swiper-slide brands__item brands__item-tablet brands__item-desktop brands__item-tablet--hidden brands__item-desktop--hidden">
                    <div class="brands__card">
                        <img class="brands__logo" src="./icon/bosch.svg" alt="Bosch">
                    </div>
                    <button class="brands__go">
                        <img class="brands__go-icon" src="./icon/go.svg" alt="go">
                    </button>
                </li>
            </ul>
            <!-- If we need pagination -->
            <div class="swiper-pagination"></div>

            <!-- If we need navigation buttons -->
            <!-- <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div> -->
            <!-- If we need scrollbar -->
            <!-- <div class="swiper-scrollbar"></div> -->

            <div class="brands__controls">
                <div class="brands__controls--720px">
                    <button id="brands__toggle-720px--visible" class="brands__toggle">
                        <img class="brands__img" src="./icon/expand.svg" alt="expand">
                        Показать все
                    </button>

                    <button id="brands__toggle-720px--hidden" class="brands__toggle">
                        <img class="brands__img brands__img-flip" src="./icon/expand.svg" alt="expand">
                        Скрыть все
                    </button>
                </div>
                <div class="brands__controls--1120px">
                    <button id="brands__toggle-1120px--visible" class="brands__toggle">
                        <img class=" brands__img" src="./icon/expand.svg" alt="expand">
                        Показать все
                    </button>
                    <button id="brands__toggle-1120px--hidden" class="brands__toggle">
                        <img class="brands__img brands__img-flip" src="./icon/expand.svg" alt="expand">
                        Скрыть все
                    </button>
                </div>
            </div>
        </section>


    </main>


    <script src="./swiper-bundle.min.js"></script>
    <script src="./script.js"></script>
</body>

</html>
